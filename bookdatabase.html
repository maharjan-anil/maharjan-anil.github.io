<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Book Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    :root {
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --card-bg: #ffffff;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --accent: #f59e0b;
      --text-main: #1e293b;
      --text-muted: #64748b;
      --border-color: #e2e8f0;
      --shadow: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
      --radius: 14px;
    }

    body {
      background: var(--bg-gradient);
      color: var(--text-main);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      padding: 2rem 1rem 4rem;
      min-height: 100vh;
    }

    .container { max-width: 900px; }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn-primary {
      background: var(--primary);
      border: none;
      border-radius: 8px;
      font-weight: 600;
    }
    .btn-primary:hover { background: var(--primary-hover); }

    .btn-warning { background: var(--accent); border: none; color: #1e293b; }
    .btn-warning:hover { background: #d97706; }

    .form-control, .form-select {
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.6rem 0.8rem;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .table th {
      background: var(--primary);
      color: white;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      font-size: 0.75rem;
      padding: 0.8rem;
    }
    .table td { vertical-align: middle; padding: 0.75rem 0.8rem; }
    .table-striped > tbody > tr:nth-of-type(odd) > td { background-color: #f8fafc; }

    .badge-genre { background: #e0e7ff; color: #3730a3; font-weight: 500; }
    .badge-binding { background: #fef3c7; color: #92400e; font-weight: 500; }

    .btn-action {
      width: 32px; height: 32px; padding: 0; display: inline-flex;
      align-items: center; justify-content: center; border-radius: 6px;
    }

    .clickable-title {
      cursor: pointer;
      color: var(--primary);
      transition: all 0.2s;
      font-weight: 600;
    }
    .clickable-title:hover { color: var(--primary-hover); text-decoration: underline; }

    /* Toggle Section Animation */
    .books-section {
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
    }
    .books-section.show {
      max-height: 2500px;
      opacity: 1;
    }

    .toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      color: var(--text-muted);
      border-radius: 50px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .toggle-btn:hover {
      color: var(--primary);
      border-color: var(--primary);
      background: #f1f5f9;
    }

    .modal-content { border-radius: var(--radius); border: none; }
    .modal-header { background: #f8fafc; border-bottom: 1px solid var(--border-color); }
    .modal-footer { background: #f8fafc; border-top: 1px solid var(--border-color); }
    .modal-desc { white-space: pre-wrap; line-height: 1.6; }

    #loading { display: none; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header & Toggle -->
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
      <h2 class="mb-0 fw-bold">📖 Book Database</h2>
      <button id="toggleBooksBtn" class="btn toggle-btn">
        <i class="bi bi-chevron-down me-1"></i> Show Saved Books
      </button>
    </div>

    <!-- Alerts -->
    <div id="alertBox" class="alert d-none rounded-3" role="alert"></div>

    <!-- Form Card -->
    <div class="card mb-4">
      <div class="card-body p-4">
        <h5 class="card-title fw-semibold mb-3 text-muted small text-uppercase">Add New Book</h5>
        <form id="bookForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="genre" class="form-label">Genre</label>
              <select class="form-select" id="genre" required>
                <option value="" disabled selected>Select Genre</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Mystery">Mystery</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Biography">Biography</option>
                <option value="History">History</option>
                <option value="Self-Help">Self-Help</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="binding" class="form-label">Book Binding</label>
              <select class="form-select" id="binding" required>
                <option value="" disabled selected>Select Binding</option>
                <option value="Paperback">Paperback</option>
                <option value="Hardcover">Hardcover</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="bookName" class="form-label">Book Name</label>
              <input type="text" class="form-control" id="bookName" placeholder="e.g. The Great Gatsby" required>
            </div>
            <div class="col-md-6">
              <label for="author" class="form-label">Author</label>
              <input type="text" class="form-control" id="author" placeholder="e.g. F. Scott Fitzgerald" required>
            </div>
            <div class="col-12">
              <label for="description" class="form-label">Description</label>
              <textarea class="form-control" id="description" rows="3" placeholder="Brief summary, notes, or quotes from the book..."></textarea>
            </div>
          </div>
          
          <div class="d-grid gap-2 mt-4 d-sm-flex">
            <button type="submit" class="btn btn-primary flex-grow-1" id="saveBtn">💾 Save Book</button>
            <button type="button" class="btn btn-outline-secondary d-none" id="cancelEditBtn">✖ Cancel</button>
          </div>
        </form>

        <div id="loading" class="text-center mt-3">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted small">Processing...</p>
        </div>
      </div>
    </div>

    <!-- Books Section (Hidden by Default) -->
    <div class="books-section" id="booksContainer">
      <div class="card">
        <div class="card-body p-4">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h5 class="card-title mb-0 fw-semibold">Saved Books</h5>
            <div class="filter-box" style="max-width: 220px;">
              <label for="genreFilter" class="form-label small text-muted mb-1">Filter by Genre</label>
              <select id="genreFilter" class="form-select form-select-sm">
                <option value="All">All Genres</option>
              </select>
            </div>
          </div>
          
          <div class="table-responsive">
            <table class="table table-striped table-hover align-middle" id="bookTable">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Genre</th>
                  <th>Book Name</th>
                  <th>Author</th>
                  <th>Binding</th>
                  <th class="text-center">Actions</th>
                </tr>
              </thead>
              <tbody id="tableBody">
                <tr><td colspan="6" class="text-center text-muted">Loading books...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Details Modal -->
  <div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title fw-bold" id="modalTitle">Book Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body p-4">
          <div class="row g-3 mb-3">
            <div class="col-md-4"><strong class="text-muted small d-block">Author</strong><span id="modalAuthor" class="fw-semibold"></span></div>
            <div class="col-md-4"><strong class="text-muted small d-block">Genre</strong><span id="modalGenre" class="badge badge-genre"></span></div>
            <div class="col-md-4"><strong class="text-muted small d-block">Binding</strong><span id="modalBinding" class="badge badge-binding"></span></div>
          </div>
          <div class="mb-3 text-muted small">
            <strong>Added on:</strong> <span id="modalDate"></span>
          </div>
          <hr class="my-3">
          <h6 class="fw-semibold mb-2">📖 Description</h6>
          <div id="modalDesc" class="text-muted modal-desc bg-light p-3 rounded border"></div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ⚠️ REPLACE WITH YOUR DEPLOYED WEB APP URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0YojaTSlqVjL3EgitbS7CX1AYGtguMQpySubeq8pSdLKqvyJ0dHPWraPeEbodHrJiCA/exec';

    const form = document.getElementById('bookForm');
    const saveBtn = document.getElementById('saveBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const loading = document.getElementById('loading');
    const alertBox = document.getElementById('alertBox');
    const tableBody = document.getElementById('tableBody');
    const genreFilter = document.getElementById('genreFilter');
    const bookModal = new bootstrap.Modal(document.getElementById('bookModal'));
    const toggleBtn = document.getElementById('toggleBooksBtn');
    const booksContainer = document.getElementById('booksContainer');

    let allBooks = [];
    let editingId = null;
    let isBooksVisible = false;

    function showAlert(msg, type = 'success') {
      alertBox.className = `alert alert-${type} show rounded-3`;
      alertBox.textContent = msg;
      setTimeout(() => alertBox.classList.add('d-none'), 4000);
    }

    function toggleLoading(show) {
      loading.style.display = show ? 'block' : 'none';
      saveBtn.disabled = show;
      cancelEditBtn.disabled = show;
    }

    // Toggle Books Section
    toggleBtn.addEventListener('click', () => {
      isBooksVisible = !isBooksVisible;
      booksContainer.classList.toggle('show', isBooksVisible);
      toggleBtn.innerHTML = isBooksVisible 
        ? '<i class="bi bi-chevron-up me-1"></i> Hide Saved Books'
        : '<i class="bi bi-chevron-down me-1"></i> Show Saved Books';
      
      if (isBooksVisible && allBooks.length === 0) {
        fetchBooks();
      }
    });

    function setEditMode(id) {
      editingId = id;
      saveBtn.textContent = '🔄 Update Book';
      saveBtn.classList.replace('btn-primary', 'btn-warning');
      cancelEditBtn.classList.remove('d-none');
      form.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function resetForm() {
      editingId = null;
      form.reset();
      saveBtn.textContent = '💾 Save Book';
      saveBtn.classList.replace('btn-warning', 'btn-primary');
      cancelEditBtn.classList.add('d-none');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        genre: document.getElementById('genre').value,
        bookName: document.getElementById('bookName').value,
        author: document.getElementById('author').value,
        binding: document.getElementById('binding').value,
        description: document.getElementById('description').value.trim()
      };

      data.action = editingId ? 'update' : 'save';
      if (editingId) data.id = editingId;

      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          showAlert('✅ ' + result.message);
          resetForm();
          await fetchBooks();
        } else {
          showAlert('❌ ' + result.message, 'danger');
        }
      } catch (err) {
        showAlert('❌ Network Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    });

    cancelEditBtn.addEventListener('click', resetForm);

    window.fetchBooks = async function() {
      toggleLoading(true);
      try {
        const res = await fetch(`${SCRIPT_URL}?action=get`);
        const result = await res.json();
        
        if (result.success) {
          allBooks = result.data;
          populateGenreFilter();
          applyFilter();
        } else {
          tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Failed to load data.</td></tr>';
        }
      } catch (err) {
        showAlert('❌ Fetch Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    };

    function populateGenreFilter() {
      const counts = {};
      allBooks.forEach(b => {
        if (b.genre) counts[b.genre] = (counts[b.genre] || 0) + 1;
      });
      
      const currentVal = genreFilter.value;
      genreFilter.innerHTML = '<option value="All">All Genres</option>';
      
      Object.keys(counts).sort().forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = `${g} (${counts[g]})`;
        genreFilter.appendChild(opt);
      });

      if ([...genreFilter.options].some(o => o.value === currentVal)) {
        genreFilter.value = currentVal;
      }
    }

    function applyFilter() {
      const selected = genreFilter.value;
      const filtered = selected === 'All' ? allBooks : allBooks.filter(b => b.genre === selected);
      renderTable(filtered);
    }

    function renderTable(books) {
      if (!books || books.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted py-4">No books found.</td></tr>';
        return;
      }

      tableBody.innerHTML = books.map(book => {
        const date = new Date(book.timestamp).toLocaleDateString();
        return `
          <tr class="fade-in">
            <td class="text-muted small">${date}</td>
            <td><span class="badge badge-genre">${book.genre}</span></td>
            <td><span class="clickable-title" onclick="viewBook('${book.id}')" title="Click to view details">${book.bookName}</span></td>
            <td>${book.author}</td>
            <td><span class="badge badge-binding">${book.binding}</span></td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary btn-action" onclick="editBook('${book.id}')" title="Edit">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger btn-action ms-1" onclick="deleteBook('${book.id}')" title="Delete">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    window.viewBook = function(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      
      document.getElementById('modalTitle').textContent = book.bookName;
      document.getElementById('modalAuthor').textContent = book.author;
      document.getElementById('modalGenre').textContent = book.genre;
      document.getElementById('modalBinding').textContent = book.binding;
      document.getElementById('modalDate').textContent = new Date(book.timestamp).toLocaleDateString();
      document.getElementById('modalDesc').textContent = book.description || 'No description available.';
      
      bookModal.show();
    };

    window.editBook = function(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      
      document.getElementById('genre').value = book.genre;
      document.getElementById('bookName').value = book.bookName;
      document.getElementById('author').value = book.author;
      document.getElementById('binding').value = book.binding;
      document.getElementById('description').value = book.description || '';
      setEditMode(id);
    };

    window.deleteBook = async function(id) {
      if (!confirm('⚠️ Permanently delete this book?')) return;
      
      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'delete', id: id })
        });
        const result = await res.json();
        if (result.success) {
          showAlert('🗑️ ' + result.message);
          await fetchBooks();
        } else {
          showAlert('❌ ' + result.message, 'danger');
        }
      } catch (err) {
        showAlert('❌ Delete Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    };

    genreFilter.addEventListener('change', applyFilter);

    // Load data silently on startup
    document.addEventListener('DOMContentLoaded', fetchBooks);
  </script>
</body>
</html>
