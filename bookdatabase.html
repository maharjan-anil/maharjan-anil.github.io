<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Book Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; padding-top: 2rem; }
    .container { max-width: 850px; }
    #loading { display: none; }
    .table th { background-color: #0d6efd; color: white; }
    .fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-4 fw-bold">📖 Book Database</h2>

    <!-- Alerts -->
    <div id="alertBox" class="alert d-none" role="alert"></div>

    <!-- Form Card -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form id="bookForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="genre" class="form-label">Genre</label>
              <select class="form-select" id="genre" required>
                <option value="" disabled selected>Select Genre</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Mystery">Mystery</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Biography">Biography</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="binding" class="form-label">Book Binding</label>
              <select class="form-select" id="binding" required>
                <option value="" disabled selected>Select Binding</option>
                <option value="Paperback">Paperback</option>
                <option value="Hardcover">Hardcover</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="bookName" class="form-label">Book Name</label>
              <input type="text" class="form-control" id="bookName" placeholder="e.g. The Great Gatsby" required>
            </div>
            <div class="col-md-6">
              <label for="author" class="form-label">Author</label>
              <input type="text" class="form-control" id="author" placeholder="e.g. F. Scott Fitzgerald" required>
            </div>
          </div>
          
          <div class="d-grid gap-2 mt-4">
            <button type="submit" class="btn btn-primary fw-semibold" id="saveBtn">💾 Save Book</button>
            <button type="button" class="btn btn-outline-secondary" id="fetchBtn">🔄 Refresh List</button>
          </div>
        </form>

        <div id="loading" class="text-center mt-3">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Processing...</p>
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="card shadow-sm">
      <div class="card-body">
        <h5 class="card-title mb-3">Saved Books</h5>
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle" id="bookTable">
            <thead>
              <tr>
                <th>Date Added</th>
                <th>Genre</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Binding</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="5" class="text-center text-muted">No books loaded yet.</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ⚠️ REPLACE THIS WITH YOUR DEPLOYED GOOGLE SCRIPT WEB APP URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0YojaTSlqVjL3EgitbS7CX1AYGtguMQpySubeq8pSdLKqvyJ0dHPWraPeEbodHrJiCA/exec';

    const form = document.getElementById('bookForm');
    const saveBtn = document.getElementById('saveBtn');
    const fetchBtn = document.getElementById('fetchBtn');
    const loading = document.getElementById('loading');
    const alertBox = document.getElementById('alertBox');
    const tableBody = document.getElementById('tableBody');

    function showAlert(msg, type = 'success') {
      alertBox.className = `alert alert-${type} show`;
      alertBox.textContent = msg;
      setTimeout(() => alertBox.classList.add('d-none'), 4000);
    }

    function toggleLoading(show) {
      loading.style.display = show ? 'block' : 'none';
      saveBtn.disabled = show;
      fetchBtn.disabled = show;
    }

    // Save Book
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        genre: document.getElementById('genre').value,
        bookName: document.getElementById('bookName').value,
        author: document.getElementById('author').value,
        binding: document.getElementById('binding').value
      };

      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' }, // Avoids CORS preflight
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          showAlert('✅ ' + result.message);
          form.reset();
          fetchBooks();
        } else {
          showAlert('❌ ' + result.message, 'danger');
        }
      } catch (err) {
        showAlert('❌ Network Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    });

    // Fetch Books
    fetchBtn.addEventListener('click', fetchBooks);

    async function fetchBooks() {
      toggleLoading(true);
      try {
        const res = await fetch(`${SCRIPT_URL}?action=get`);
        const result = await res.json();
        
        if (result.success && result.data.length > 0) {
          tableBody.innerHTML = '';
          result.data.forEach(book => {
            const date = new Date(book.timestamp).toLocaleDateString();
            tableBody.innerHTML += `
              <tr class="fade-in">
                <td>${date}</td>
                <td><span class="badge bg-info text-dark">${book.genre}</span></td>
                <td class="fw-semibold">${book.bookName}</td>
                <td>${book.author}</td>
                <td><span class="badge ${book.binding === 'Hardcover' ? 'bg-warning text-dark' : 'bg-secondary'}">${book.binding}</span></td>
              </tr>`;
          });
        } else {
          tableBody.innerHTML = '<tr><td colspan="5" class="text-center text-muted">No books found in the database.</td></tr>';
        }
      } catch (err) {
        showAlert('❌ Failed to fetch: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    }

    // Load on startup
    document.addEventListener('DOMContentLoaded', fetchBooks);
  </script>
</body>
</html>
