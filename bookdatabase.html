<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📚 Book Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background-color: #f4f6f9; padding-top: 2rem; }
    .container { max-width: 950px; }
    #loading { display: none; }
    .table th { background-color: #0d6efd; color: white; }
    .fade-in { animation: fadeIn 0.4s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .filter-box { max-width: 240px; }
    .btn-action { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; }
    .clickable-title { cursor: pointer; transition: color 0.2s; }
    .clickable-title:hover { color: #0d6efd; text-decoration: underline; }
    .modal-desc { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="text-center mb-4 fw-bold">📖 Book Manager</h2>

    <!-- Alerts -->
    <div id="alertBox" class="alert d-none" role="alert"></div>

    <!-- Form Card -->
    <div class="card shadow-sm mb-4">
      <div class="card-body">
        <form id="bookForm">
          <div class="row g-3">
            <div class="col-md-6">
              <label for="genre" class="form-label">Genre</label>
              <select class="form-select" id="genre" required>
                <option value="" disabled selected>Select Genre</option>
                <option value="Fiction">Fiction</option>
                <option value="Non-Fiction">Non-Fiction</option>
                <option value="Sci-Fi">Sci-Fi</option>
                <option value="Mystery">Mystery</option>
                <option value="Fantasy">Fantasy</option>
                <option value="Biography">Biography</option>
                <option value="History">History</option>
                <option value="Self-Help">Self-Help</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="binding" class="form-label">Book Binding</label>
              <select class="form-select" id="binding" required>
                <option value="" disabled selected>Select Binding</option>
                <option value="Paperback">Paperback</option>
                <option value="Hardcover">Hardcover</option>
              </select>
            </div>
            <div class="col-md-6">
              <label for="bookName" class="form-label">Book Name</label>
              <input type="text" class="form-control" id="bookName" placeholder="e.g. The Great Gatsby" required>
            </div>
            <div class="col-md-6">
              <label for="author" class="form-label">Author</label>
              <input type="text" class="form-control" id="author" placeholder="e.g. F. Scott Fitzgerald" required>
            </div>
            <div class="col-12">
              <label for="description" class="form-label">Description</label>
              <textarea class="form-control" id="description" rows="3" placeholder="Brief summary or notes about the book..."></textarea>
            </div>
          </div>
          
          <div class="d-grid gap-2 mt-4 d-sm-flex">
            <button type="submit" class="btn btn-primary fw-semibold flex-grow-1" id="saveBtn">💾 Save Book</button>
            <button type="button" class="btn btn-outline-secondary d-none" id="cancelEditBtn">✖ Cancel</button>
          </div>
        </form>

        <div id="loading" class="text-center mt-3">
          <div class="spinner-border text-primary" role="status"></div>
          <p class="mt-2 text-muted">Processing...</p>
        </div>
      </div>
    </div>

    <!-- Data Table -->
    <div class="card shadow-sm">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
          <h5 class="card-title mb-0">Saved Books</h5>
          <div class="filter-box">
            <label for="genreFilter" class="form-label small text-muted mb-1">Filter by Genre</label>
            <select id="genreFilter" class="form-select form-select-sm">
              <option value="All">All Genres</option>
            </select>
          </div>
        </div>
        
        <div class="table-responsive">
          <table class="table table-striped table-hover align-middle" id="bookTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Genre</th>
                <th>Book Name</th>
                <th>Author</th>
                <th>Binding</th>
                <th class="text-center">Actions</th>
              </tr>
            </thead>
            <tbody id="tableBody">
              <tr><td colspan="6" class="text-center text-muted">Loading books...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Details Modal -->
  <div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-light">
          <h5 class="modal-title fw-bold" id="modalTitle">Book Details</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="row mb-3">
            <div class="col-6"><strong>Author:</strong> <span id="modalAuthor"></span></div>
            <div class="col-6"><strong>Binding:</strong> <span id="modalBinding" class="badge bg-secondary"></span></div>
          </div>
          <div class="mb-3">
            <strong>Genre:</strong> <span id="modalGenre" class="badge bg-info text-dark"></span>
          </div>
          <div class="mb-3 text-muted small">
            <strong>Date Added:</strong> <span id="modalDate"></span>
          </div>
          <hr>
          <h6 class="fw-semibold">📖 Description</h6>
          <p id="modalDesc" class="text-muted modal-desc"></p>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // ⚠️ REPLACE WITH YOUR DEPLOYED WEB APP URL
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw0YojaTSlqVjL3EgitbS7CX1AYGtguMQpySubeq8pSdLKqvyJ0dHPWraPeEbodHrJiCA/exec';

    const form = document.getElementById('bookForm');
    const saveBtn = document.getElementById('saveBtn');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const loading = document.getElementById('loading');
    const alertBox = document.getElementById('alertBox');
    const tableBody = document.getElementById('tableBody');
    const genreFilter = document.getElementById('genreFilter');
    const bookModal = new bootstrap.Modal(document.getElementById('bookModal'));

    let allBooks = [];
    let editingId = null;

    function showAlert(msg, type = 'success') {
      alertBox.className = `alert alert-${type} show`;
      alertBox.textContent = msg;
      setTimeout(() => alertBox.classList.add('d-none'), 4000);
    }

    function toggleLoading(show) {
      loading.style.display = show ? 'block' : 'none';
      saveBtn.disabled = show;
      cancelEditBtn.disabled = show;
    }

    function setEditMode(id) {
      editingId = id;
      saveBtn.textContent = '🔄 Update Book';
      saveBtn.classList.replace('btn-primary', 'btn-warning');
      cancelEditBtn.classList.remove('d-none');
      form.scrollIntoView({ behavior: 'smooth' });
    }

    function resetForm() {
      editingId = null;
      form.reset();
      saveBtn.textContent = '💾 Save Book';
      saveBtn.classList.replace('btn-warning', 'btn-primary');
      cancelEditBtn.classList.add('d-none');
    }

    // Save or Update
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = {
        genre: document.getElementById('genre').value,
        bookName: document.getElementById('bookName').value,
        author: document.getElementById('author').value,
        binding: document.getElementById('binding').value,
        description: document.getElementById('description').value.trim()
      };

      if (editingId) {
        data.id = editingId;
        data.action = 'update';
      } else {
        data.action = 'save';
      }

      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.success) {
          showAlert('✅ ' + result.message);
          resetForm();
          await fetchBooks();
        } else {
          showAlert('❌ ' + result.message, 'danger');
        }
      } catch (err) {
        showAlert('❌ Network Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    });

    cancelEditBtn.addEventListener('click', resetForm);

    // Fetch Books
    window.fetchBooks = async function() {
      toggleLoading(true);
      try {
        const res = await fetch(`${SCRIPT_URL}?action=get`);
        const result = await res.json();
        
        if (result.success) {
          allBooks = result.data;
          populateGenreFilter();
          applyFilter();
        } else {
          tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-danger">Failed to load data.</td></tr>';
        }
      } catch (err) {
        showAlert('❌ Fetch Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    };

    function populateGenreFilter() {
      const counts = {};
      allBooks.forEach(b => {
        if (b.genre) counts[b.genre] = (counts[b.genre] || 0) + 1;
      });
      
      const currentVal = genreFilter.value;
      genreFilter.innerHTML = '<option value="All">All Genres</option>';
      
      Object.keys(counts).sort().forEach(g => {
        const opt = document.createElement('option');
        opt.value = g;
        opt.textContent = `${g} (${counts[g]})`;
        genreFilter.appendChild(opt);
      });

      if ([...genreFilter.options].some(o => o.value === currentVal)) {
        genreFilter.value = currentVal;
      }
    }

    function applyFilter() {
      const selected = genreFilter.value;
      const filtered = selected === 'All' ? allBooks : allBooks.filter(b => b.genre === selected);
      renderTable(filtered);
    }

    function renderTable(books) {
      if (!books || books.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">No books found.</td></tr>';
        return;
      }

      tableBody.innerHTML = books.map(book => {
        const date = new Date(book.timestamp).toLocaleDateString();
        const bindingClass = book.binding === 'Hardcover' ? 'bg-warning text-dark' : 'bg-secondary';
        return `
          <tr class="fade-in">
            <td>${date}</td>
            <td><span class="badge bg-info text-dark">${book.genre}</span></td>
            <td><span class="fw-semibold clickable-title" onclick="viewBook('${book.id}')" title="Click to view details">${book.bookName}</span></td>
            <td>${book.author}</td>
            <td><span class="badge ${bindingClass}">${book.binding}</span></td>
            <td class="text-center">
              <button class="btn btn-sm btn-outline-primary btn-action" onclick="editBook('${book.id}')" title="Edit">
                <i class="bi bi-pencil"></i>
              </button>
              <button class="btn btn-sm btn-outline-danger btn-action ms-1" onclick="deleteBook('${book.id}')" title="Delete">
                <i class="bi bi-trash"></i>
              </button>
            </td>
          </tr>`;
      }).join('');
    }

    // View Details Modal
    window.viewBook = function(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      
      document.getElementById('modalTitle').textContent = book.bookName;
      document.getElementById('modalAuthor').textContent = book.author;
      document.getElementById('modalGenre').textContent = book.genre;
      document.getElementById('modalBinding').textContent = book.binding;
      document.getElementById('modalDate').textContent = new Date(book.timestamp).toLocaleDateString();
      document.getElementById('modalDesc').textContent = book.description || 'No description available.';
      
      bookModal.show();
    };

    // Edit Book
    window.editBook = function(id) {
      const book = allBooks.find(b => b.id === id);
      if (!book) return;
      
      document.getElementById('genre').value = book.genre;
      document.getElementById('bookName').value = book.bookName;
      document.getElementById('author').value = book.author;
      document.getElementById('binding').value = book.binding;
      document.getElementById('description').value = book.description || '';
      setEditMode(id);
    };

    // Delete Book
    window.deleteBook = async function(id) {
      if (!confirm('⚠️ Are you sure you want to permanently delete this book?')) return;
      
      toggleLoading(true);
      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'delete', id: id })
        });
        const result = await res.json();
        if (result.success) {
          showAlert('🗑️ ' + result.message);
          await fetchBooks();
        } else {
          showAlert('❌ ' + result.message, 'danger');
        }
      } catch (err) {
        showAlert('❌ Delete Error: ' + err.message, 'danger');
      } finally {
        toggleLoading(false);
      }
    };

    genreFilter.addEventListener('change', applyFilter);

    // Initial load
    document.addEventListener('DOMContentLoaded', fetchBooks);
  </script>
</body>
</html>
