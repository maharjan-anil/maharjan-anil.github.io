<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f4f6f9; }
    .low-stock { background-color: #fff1f1 !important; }
    .app-wrapper { min-height: 100vh; padding: 1.5rem 0; }
    .currency { font-family: 'Segoe UI', system-ui, sans-serif; }
    .table td, .table th { 
      font-size: 0.85rem; 
      vertical-align: middle;
      padding: 0.75rem 0.5rem;
    }
    .text-truncate-custom { 
      max-width: 150px; 
      overflow: hidden; 
      text-overflow: ellipsis; 
      white-space: nowrap;
      display: block;
    }
    .col-title { min-width: 180px; }
    .col-author { min-width: 120px; }
    .col-genre { min-width: 100px; }
    .col-isbn { min-width: 130px; }
    .col-binding { min-width: 100px; }
    .col-publisher { min-width: 120px; }
    .col-cost { min-width: 100px; text-align: right; }
    .col-sell { min-width: 100px; text-align: right; }
    .col-stock { min-width: 60px; text-align: center; }
    .col-actions { min-width: 100px; text-align: center; }
  </style>
</head>
<body>

  <div class="container app-wrapper">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2 class="mb-0">📚 Bookstore Tracker</h2>
      <span class="badge bg-secondary">NPR Mode</span>
    </div>

    <!-- Add Form -->
    <div class="card mb-4 shadow-sm">
      <div class="card-header bg-primary text-white">➕ Add New Book</div>
      <div class="card-body">
        <form id="bookForm" class="row g-3">
          <div class="col-md-3"><input type="text" class="form-control" id="title" placeholder="Title" required></div>
          <div class="col-md-3"><input type="text" class="form-control" id="author" placeholder="Author" required></div>
          <div class="col-md-2"><input type="text" class="form-control" id="genre" placeholder="Genre" required></div>
          <div class="col-md-2">
            <select class="form-select" id="binding">
              <option value="Paperback">Paperback</option>
              <option value="Hardcover">Hardcover</option>
              <option value="Spiral">Spiral</option>
              <option value="E-Book">E-Book</option>
            </select>
          </div>
          <div class="col-md-2"><input type="text" class="form-control" id="publisher" placeholder="Publisher"></div>
          
          <div class="col-md-2"><input type="text" class="form-control" id="isbn" placeholder="ISBN"></div>
          <div class="col-md-2"><input type="number" class="form-control" id="costPrice" placeholder="Cost (NPR)" step="0.01" required></div>
          <div class="col-md-2"><input type="number" class="form-control" id="sellingPrice" placeholder="Selling (NPR)" step="0.01" required></div>
          <div class="col-md-2"><input type="number" class="form-control" id="currentStock" placeholder="Stock" min="0" value="0" required></div>
          <div class="col-md-4"><button type="submit" class="btn btn-success w-100">💾 Save Book</button></div>
        </form>
      </div>
    </div>

    <!-- Search -->
    <div class="input-group mb-3 shadow-sm">
      <span class="input-group-text bg-white"><i class="bi bi-search"></i></span>
      <input type="text" class="form-control" id="searchInput" placeholder="Search by title, author, genre, ISBN, publisher, or ID...">
      <button class="btn btn-outline-secondary" type="button" id="clearSearch" style="display:none;"><i class="bi bi-x-lg"></i></button>
    </div>

    <!-- Summary -->
    <div class="row mb-3 g-3">
      <div class="col-md-4"><div class="card bg-success text-white shadow-sm"><div class="card-body">Est. Profit: <strong id="filteredProfit" class="currency">रू 0.00</strong></div></div></div>
      <div class="col-md-4"><div class="card bg-info text-white shadow-sm"><div class="card-body">Books Shown: <strong id="bookCount">0</strong></div></div></div>
      <div class="col-md-4"><div class="card bg-warning text-dark shadow-sm"><div class="card-body">⚠️ Low Stock: <strong id="lowStockCount">0</strong></div></div></div>
    </div>

    <!-- Table -->
    <div class="table-responsive bg-white rounded shadow-sm">
      <table class="table table-hover align-middle mb-0">
        <thead class="table-dark">
          <tr>
            <th class="col-title">Title</th>
            <th class="col-author">Author</th>
            <th class="col-genre">Genre</th>
            <th class="col-isbn">ISBN</th>
            <th class="col-binding">Binding</th>
            <th class="col-publisher">Publisher</th>
            <th class="col-cost">Cost</th>
            <th class="col-sell">Sell</th>
            <th class="col-stock">Stock</th>
            <th class="col-actions">Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="10" class="text-center py-4">Loading books...</td></tr>
        </tbody>
      </table>
    </div>
    <div id="noResults" class="text-center py-4 d-none text-muted">No books match your search.</div>
  </div>

  <!-- ✏️ Edit Modal -->
  <div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-warning"><h5 class="modal-title">✏️ Edit Book</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">
          <form id="editForm">
            <input type="hidden" id="editId">
            <div class="row g-3">
              <div class="col-md-5"><label>Title</label><input type="text" class="form-control" id="editTitle" required></div>
              <div class="col-md-3"><label>Author</label><input type="text" class="form-control" id="editAuthor" required></div>
              <div class="col-md-4"><label>Genre</label><input type="text" class="form-control" id="editGenre"></div>
              <div class="col-md-3"><label>ISBN</label><input type="text" class="form-control" id="editIsbn"></div>
              <div class="col-md-3"><label>Publisher</label><input type="text" class="form-control" id="editPublisher"></div>
              <div class="col-md-3"><label>Binding</label>
                <select class="form-select" id="editBinding">
                  <option value="Paperback">Paperback</option>
                  <option value="Hardcover">Hardcover</option>
                  <option value="Spiral">Spiral</option>
                  <option value="E-Book">E-Book</option>
                </select>
              </div>
              <div class="col-md-4"><label>Cost (NPR)</label><input type="number" class="form-control" id="editCost" step="0.01"></div>
              <div class="col-md-4"><label>Selling (NPR)</label><input type="number" class="form-control" id="editSell" step="0.01"></div>
              <div class="col-md-4"><label>Stock</label><input type="number" class="form-control" id="editStock" min="0"></div>
            </div>
          </form>
        </div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-primary" id="saveEditBtn">Save Changes</button></div>
      </div>
    </div>
  </div>

  <!-- 🗑️ Delete Modal -->
  <div class="modal fade" id="deleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header bg-danger text-white"><h5 class="modal-title">🗑️ Delete Book</h5><button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button></div>
        <div class="modal-body">Are you sure you want to delete <strong id="deleteBookTitle"></strong>? This cannot be undone.</div>
        <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 🔑 CONFIGURATION
    const API_URL = 'https://script.google.com/macros/s/AKfycby2S4BsCvmTQBsFFdhQ19haPBg82feDnS4R8RIdS0jvPhC2iYksp4LfCEhRRkIyuP5S/exec'; // 👈 REPLACE WITH YOUR DEPLOYED URL
    const LOW_STOCK_THRESHOLD = 5;

    let allBooks = [];
    const editModal = new bootstrap.Modal(document.getElementById('editModal'));
    const deleteModal = new bootstrap.Modal(document.getElementById('deleteModal'));
    let deleteTargetId = null;

    // 💰 NPR FORMATTER
    const formatNPR = (val) => 'रू ' + Number(val).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ",");

    // 📥 DATA FETCH
    async function loadBooks() {
      try {
        const res = await fetch(API_URL);
        const json = await res.json();
        if (json.success) {
          allBooks = json.data;
          renderBooks(allBooks);
        } else alert('Load error: ' + json.error);
      } catch {
        document.getElementById('tableBody').innerHTML = `<tr><td colspan="10" class="text-danger text-center">Connection failed. Check API_URL & GAS deployment.</td></tr>`;
      }
    }

    // 🖼️ RENDER
    function renderBooks(books) {
      const tbody = document.getElementById('tableBody');
      tbody.innerHTML = '';
      let profit = 0, lowStock = 0;

      books.forEach(b => {
        const stock = Number(b.currentStock) || 0;
        const isLow = stock <= LOW_STOCK_THRESHOLD;
        if (isLow) lowStock++;
        profit += ((Number(b.sellingPrice)||0) - (Number(b.costPrice)||0)) * stock;

        const row = document.createElement('tr');
        if (isLow) row.classList.add('low-stock');
        
        row.innerHTML = `
          <td class="col-title"><div class="fw-bold text-truncate-custom" title="${b.title || ''}">${b.title || '-'}</div></td>
          <td class="col-author"><div class="text-truncate-custom" title="${b.author || ''}">${b.author || '-'}</div></td>
          <td class="col-genre"><span class="badge bg-light text-dark border">${b.genre || '-'}</span></td>
          <td class="col-isbn text-muted small">${b.isbn || '-'}</td>
          <td class="col-binding">${b.binding || '-'}</td>
          <td class="col-publisher"><div class="text-truncate-custom" title="${b.publisher || ''}">${b.publisher || '-'}</div></td>
          <td class="col-cost currency">${formatNPR(b.costPrice)}</td>
          <td class="col-sell currency fw-bold text-success">${formatNPR(b.sellingPrice)}</td>
          <td class="col-stock"><span class="badge bg-${isLow ? 'danger' : 'success'}">${stock}</span></td>
          <td class="col-actions">
            <button class="btn btn-sm btn-outline-warning me-1" onclick="openEditModal('${b.id}')"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="openDeleteModal('${b.id}')"><i class="bi bi-trash"></i></button>
          </td>
        `;
        
        tbody.appendChild(row);
      });

      document.getElementById('filteredProfit').textContent = formatNPR(profit);
      document.getElementById('bookCount').textContent = books.length;
      document.getElementById('lowStockCount').textContent = lowStock;
      document.getElementById('noResults').classList.toggle('d-none', books.length > 0);
    }

    // 🔍 SEARCH
    document.getElementById('searchInput').addEventListener('input', (e) => {
      const q = e.target.value.toLowerCase().trim();
      document.getElementById('clearSearch').style.display = q ? 'inline-block' : 'none';
      renderBooks(allBooks.filter(b => 
        String(b.title || '').toLowerCase().includes(q) || 
        String(b.author || '').toLowerCase().includes(q) || 
        String(b.genre || '').toLowerCase().includes(q) || 
        String(b.isbn || '').includes(q) || 
        String(b.publisher || '').toLowerCase().includes(q) ||
        String(b.id || '').includes(q)
      ));
    });

    document.getElementById('clearSearch').addEventListener('click', () => {
      document.getElementById('searchInput').value = '';
      document.getElementById('clearSearch').style.display = 'none';
      renderBooks(allBooks);
    });

    // ✏️ EDIT
    window.openEditModal = (id) => {
      const b = allBooks.find(x => x.id === id);
      if (!b) return;
      document.getElementById('editId').value = b.id;
      document.getElementById('editTitle').value = b.title || '';
      document.getElementById('editAuthor').value = b.author || '';
      document.getElementById('editGenre').value = b.genre || '';
      document.getElementById('editIsbn').value = b.isbn || '';
      document.getElementById('editPublisher').value = b.publisher || '';
      document.getElementById('editBinding').value = b.binding || 'Paperback';
      document.getElementById('editCost').value = b.costPrice || '';
      document.getElementById('editSell').value = b.sellingPrice || '';
      document.getElementById('editStock').value = b.currentStock || '';
      editModal.show();
    };

    document.getElementById('saveEditBtn').addEventListener('click', async () => {
      const btn = document.getElementById('saveEditBtn');
      btn.disabled = true; btn.textContent = 'Saving...';
      const payload = {
        action: 'update', id: document.getElementById('editId').value,
        title: document.getElementById('editTitle').value, author: document.getElementById('editAuthor').value,
        genre: document.getElementById('editGenre').value, isbn: document.getElementById('editIsbn').value,
        publisher: document.getElementById('editPublisher').value, binding: document.getElementById('editBinding').value,
        costPrice: document.getElementById('editCost').value, sellingPrice: document.getElementById('editSell').value,
        currentStock: document.getElementById('editStock').value
      };
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.success) { editModal.hide(); loadBooks(); }
        else alert(result.error);
      } catch { alert('Network error'); }
      finally { btn.disabled = false; btn.textContent = 'Save Changes'; }
    });

    // 🗑️ DELETE
    window.openDeleteModal = (id) => {
      const b = allBooks.find(x => x.id === id);
      deleteTargetId = id;
      document.getElementById('deleteBookTitle').textContent = b ? b.title : '';
      deleteModal.show();
    };

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      const btn = document.getElementById('confirmDeleteBtn');
      btn.disabled = true; btn.textContent = 'Deleting...';
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'delete', id: deleteTargetId }) });
        const result = await res.json();
        if (result.success) { deleteModal.hide(); loadBooks(); }
        else alert(result.error);
      } catch { alert('Network error'); }
      finally { btn.disabled = false; btn.textContent = 'Delete'; }
    });

    // ➕ ADD
    document.getElementById('bookForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true; btn.textContent = 'Adding...';
      const payload = {
        action: 'add',
        title: document.getElementById('title').value, author: document.getElementById('author').value,
        genre: document.getElementById('genre').value, binding: document.getElementById('binding').value,
        isbn: document.getElementById('isbn').value, publisher: document.getElementById('publisher').value,
        costPrice: document.getElementById('costPrice').value, sellingPrice: document.getElementById('sellingPrice').value,
        currentStock: document.getElementById('currentStock').value
      };
      try {
        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
        const result = await res.json();
        if (result.success) { e.target.reset(); loadBooks(); }
        else alert(result.error);
      } catch { alert('Network error'); }
      finally { btn.disabled = false; btn.textContent = '💾 Save Book'; }
    });

    // 🚀 INIT
    window.addEventListener('DOMContentLoaded', loadBooks);
  </script>
</body>
</html>
